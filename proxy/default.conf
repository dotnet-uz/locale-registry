worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format custom '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" "$gzip_ratio"';

    access_log /etc/nginx/logs/access.log combined;
    error_log /etc/nginx/logs/error.log warn;

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/registry.crt;
        ssl_certificate_key /etc/nginx/certs/registry.key;

        # Allow large uploads
        client_max_body_size 0;  
      
        location / {
            return 404;
        }

        # 🔓 Allow unauthenticated access for blob checks (GET/HEAD)
        location ~ ^/v2/.*/blobs/ {
            proxy_pass http://registry:5000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 900;
            proxy_connect_timeout 900;
            proxy_redirect off;
        }

        # 🔐 Everything else requires auth
        location /v2/ {
            auth_basic "Registry Authentication";
            auth_basic_user_file /etc/nginx/auth/htpasswd;
  
            proxy_pass http://registry:5000;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Docker-Distribution-API-Version registry/2.0;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 900;
            proxy_connect_timeout 900;
            proxy_redirect off;
            
            chunked_transfer_encoding on;
            proxy_request_buffering off;
        }
    }
}